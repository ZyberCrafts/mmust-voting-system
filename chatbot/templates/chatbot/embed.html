<!-- chatbot/templates/chatbot/embed.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: transparent;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .chat-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-color, #f8f9fa);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .message {
            margin-bottom: 1rem;
        }
        .message.user {
            text-align: right;
        }
        .message.bot {
            text-align: left;
        }
        .bubble {
            display: inline-block;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user .bubble {
            background: #0d6efd;
            color: white;
        }
        .bot .bubble {
            background: #e9ecef;
            color: #212529;
        }
        .input-area {
            padding: 0.75rem;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        .typing {
            display: none;
            margin: 0.5rem 0;
            color: #6c757d;
        }
        .typing.active {
            display: block;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .suggestion-btn {
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="text-center text-muted py-4">
                <i class="fas fa-comment-dots fa-2x mb-2"></i>
                <p>Ask me anything about voting!</p>
            </div>
        </div>
        <div class="typing" id="typingIndicator">
            <div class="ms-2">
                <i class="fas fa-ellipsis-h"></i> Assistant is typing...
            </div>
        </div>
        <div class="input-area">
            <div class="input-group">
                <input type="text" class="form-control" id="chatInput" placeholder="Type your message..." autocomplete="off">
                <button class="btn btn-primary" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="suggestions">
                <button class="btn btn-sm btn-outline-secondary suggestion-btn" data-msg="How do I register?">Register</button>
                <button class="btn btn-sm btn-outline-secondary suggestion-btn" data-msg="How do I vote?">Vote</button>
                <button class="btn btn-sm btn-outline-secondary suggestion-btn" data-msg="Who are the candidates?">Candidates</button>
                <button class="btn btn-sm btn-outline-secondary suggestion-btn" data-msg="Live turnout">Turnout</button>
                <button class="btn btn-sm btn-outline-secondary suggestion-btn" data-msg="Results">Results</button>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('chatMessages');
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        let sessionId = null;

        function getCookie(name) {
            let value = `; ${document.cookie}`;
            let parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        function setTyping(typing) {
            typingIndicator.classList.toggle('active', typing);
        }

        function addMessage(text, isBot) {
            const div = document.createElement('div');
            div.className = `message ${isBot ? 'bot' : 'user'}`;
            div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(text) {
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        async function sendMessage(message = null) {
            const msg = message !== null ? message : input.value.trim();
            if (!msg) return;

            addMessage(msg, false);
            input.value = '';
            setTyping(true);

            if (!sessionId) sessionId = getCookie('chat_session');
            let userId = null;
            {% if user.is_authenticated %}userId = {{ user.id }};{% endif %}

            try {
                const res = await fetch('/chatbot/api/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, session_id: sessionId, user_id: userId })
                });
                const data = await res.json();
                setTyping(false);
                if (data.response) addMessage(data.response, true);
                else addMessage('Sorry, something went wrong.', true);
                if (data.session_id) sessionId = data.session_id;
            } catch (err) {
                setTyping(false);
                addMessage('Network error. Please try again.', true);
            }
        }

        sendBtn.addEventListener('click', () => sendMessage());
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.querySelectorAll('.suggestion-btn').forEach(btn => {
            btn.addEventListener('click', () => sendMessage(btn.getAttribute('data-msg')));
        });
        input.focus();
    </script>
</body>
</html>
