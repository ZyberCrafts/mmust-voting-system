{% extends 'voting/base.html' %}

{% block content %}
<div x-data="passwordReset()" x-init="init()" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 animate__animated animate__fadeInUp">
                <div class="card-header bg-primary text-white text-center rounded-top-4 py-3">
                    <h3 class="mb-0"><i class="fas fa-key me-2"></i>Set New Password</h3>
                    <p class="mb-0 mt-2 small">Create a strong password for your account</p>
                </div>
                <div class="card-body p-4">
                    <form method="post" @submit.prevent="validateAndSubmit">
                        {% csrf_token %}

                        <!-- New password field with toggle -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">New Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="new_password1" name="new_password1" 
                                       x-model="newPassword1" @input="checkPasswordStrength" required>
                                <button class="btn btn-outline-secondary" type="button" @click="togglePassword('new_password1')">
                                    <i class="fas fa-eye" :class="{'fa-eye-slash': showNewPassword}"></i>
                                </button>
                            </div>
                            <!-- Password strength meter -->
                            <div class="mt-2">
                                <div class="progress" style="height: 6px;">
                                    <div class="progress-bar" :class="strengthClass" :style="{width: strengthPercent + '%'}"></div>
                                </div>
                                <small class="text-muted" x-text="strengthText"></small>
                            </div>
                            <div class="form-text">Minimum 8 characters, at least one letter and one number.</div>
                        </div>

                        <!-- Confirm password field -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Confirm New Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="new_password2" name="new_password2" 
                                       x-model="newPassword2" @input="checkMatch" required>
                                <button class="btn btn-outline-secondary" type="button" @click="togglePassword('new_password2')">
                                    <i class="fas fa-eye" :class="{'fa-eye-slash': showConfirmPassword}"></i>
                                </button>
                            </div>
                            <div class="mt-1">
                                <span x-show="passwordMatch === false" class="text-danger small">
                                    <i class="fas fa-times-circle"></i> Passwords do not match
                                </span>
                                <span x-show="passwordMatch === true" class="text-success small">
                                    <i class="fas fa-check-circle"></i> Passwords match
                                </span>
                            </div>
                        </div>

                        <!-- Form errors (if any from Django) -->
                        <div x-show="formErrors.length > 0" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <strong><i class="fas fa-exclamation-triangle"></i> Errors:</strong>
                            <ul class="mb-0 mt-1">
                                <template x-for="error in formErrors">
                                    <li x-text="error"></li>
                                </template>
                            </ul>
                        </div>

                        <!-- Submit button with loading state -->
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" :disabled="!isValid || submitting">
                            <span x-show="!submitting"><i class="fas fa-save"></i> Change Password</span>
                            <span x-show="submitting"><span class="spinner-border spinner-border-sm me-2"></span> Processing...</span>
                        </button>
                    </form>
                </div>
                <div class="card-footer bg-light text-center rounded-bottom-4">
                    <small><i class="fas fa-arrow-left me-1"></i> <a href="{% url 'login' %}">Back to Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Inline CSS for additional animations -->
<style>
    .animate__animated {
        animation-duration: 0.6s;
    }
    .progress-bar {
        transition: width 0.3s ease;
    }
    .form-control:focus {
        border-color: #0000FF;
        box-shadow: 0 0 0 0.2rem rgba(0, 0, 255, 0.25);
    }
    .btn-primary {
        background-color: #0000FF;
        border: none;
        transition: transform 0.2s;
    }
    .btn-primary:hover:not(:disabled) {
        background-color: #0000cc;
        transform: translateY(-2px);
    }
    .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .card {
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 1rem 3rem rgba(0,0,0,.175) !important;
    }
</style>

<!-- Alpine.js component -->
<script>
    function passwordReset() {
        return {
            newPassword1: '',
            newPassword2: '',
            strengthPercent: 0,
            strengthText: '',
            strengthClass: '',
            passwordMatch: null,  // true, false, null
            showNewPassword: false,
            showConfirmPassword: false,
            submitting: false,
            formErrors: [],

            init() {
                // Pre-fill errors from Django form if any (they will be in the DOM)
                const errorList = document.querySelector('.errorlist');
                if (errorList) {
                    this.formErrors = Array.from(errorList.querySelectorAll('li')).map(li => li.innerText);
                }
            },

            checkPasswordStrength() {
                const password = this.newPassword1;
                let strength = 0;
                if (password.length >= 8) strength++;
                if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
                if (password.match(/\d/)) strength++;
                if (password.match(/[^a-zA-Z\d]/)) strength++;
                
                if (password.length === 0) {
                    this.strengthPercent = 0;
                    this.strengthText = '';
                    this.strengthClass = '';
                } else if (strength === 1) {
                    this.strengthPercent = 25;
                    this.strengthText = 'Weak';
                    this.strengthClass = 'bg-danger';
                } else if (strength === 2) {
                    this.strengthPercent = 50;
                    this.strengthText = 'Fair';
                    this.strengthClass = 'bg-warning';
                } else if (strength === 3) {
                    this.strengthPercent = 75;
                    this.strengthText = 'Good';
                    this.strengthClass = 'bg-info';
                } else {
                    this.strengthPercent = 100;
                    this.strengthText = 'Strong';
                    this.strengthClass = 'bg-success';
                }
                this.checkMatch();
            },

            checkMatch() {
                if (this.newPassword2 === '') {
                    this.passwordMatch = null;
                } else {
                    this.passwordMatch = (this.newPassword1 === this.newPassword2);
                }
            },

            togglePassword(fieldId) {
                const field = document.getElementById(fieldId);
                if (field.type === 'password') {
                    field.type = 'text';
                    if (fieldId === 'new_password1') this.showNewPassword = true;
                    else this.showConfirmPassword = true;
                } else {
                    field.type = 'password';
                    if (fieldId === 'new_password1') this.showNewPassword = false;
                    else this.showConfirmPassword = false;
                }
            },

            get isValid() {
                return this.passwordMatch === true && this.newPassword1.length >= 8 && this.strengthPercent >= 25;
            },

            validateAndSubmit() {
                if (!this.isValid) {
                    if (this.newPassword1.length < 8) {
                        this.formErrors = ['Password must be at least 8 characters.'];
                    } else if (this.passwordMatch !== true) {
                        this.formErrors = ['Passwords do not match.'];
                    } else {
                        this.formErrors = ['Please ensure your password meets the strength requirements.'];
                    }
                    return;
                }
                this.submitting = true;
                this.formErrors = [];
                // Submit the form manually
                this.$el.querySelector('form').submit();
            }
        };
    }
</script>

<!-- Font Awesome icons (already in base? but ensure) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
{% endblock %}
