{% extends 'voting/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow animate__animated animate__fadeInUp" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header bg-primary text-white text-center py-4">
                <h3 class="mb-0"><i class="fas fa-smile-wink"></i> Your Feedback Matters</h3>
                <p class="mb-0 small">Help us improve the voting experience</p>
            </div>
            <div class="card-body p-4">
                <form method="post" id="feedbackForm">
                    {% csrf_token %}

                    <!-- Rating with animated stars (using simple HTML + Alpine) -->
                    <div class="mb-4 text-center" x-data="{ rating: 0 }">
                        <label class="form-label fw-bold">Rate your voting experience</label>
                        <div class="d-flex justify-content-center gap-2">
                            <template x-for="i in 5" :key="i">
                                <button type="button"
                                        @click="rating = i"
                                        class="star-btn"
                                        :class="{ 'selected': rating >= i }"
                                        style="background: none; border: none; padding: 0;">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <polygon points="12 17.27 18.18 21 16.54 13.97 22 9.24 14.81 8.63 12 2 9.19 8.63 2 9.24 7.46 13.97 5.82 21 12 17.27" />
                                    </svg>
                                </button>
                            </template>
                        </div>
                        <input type="hidden" name="rating" :value="rating" id="id_rating">
                    </div>

                    <!-- Comment field -->
                    <div class="mb-4">
                        <label for="id_comment" class="form-label">Your comments (optional)</label>
                        <textarea name="comment" id="id_comment" class="form-control" rows="4" placeholder="Tell us what you think..."></textarea>
                        <div class="text-end small text-muted mt-1">
                            <span id="charCount">0</span> / 500
                        </div>
                    </div>

                    <!-- Submit button -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            Submit Feedback
                        </button>
                    </div>
                </form>

                <div class="mt-4 text-center text-muted small">
                    <i class="fas fa-lock"></i> Your feedback is anonymous and helps us improve.
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .star-btn {
        background: none;
        border: none;
        color: #ddd;
        cursor: pointer;
        padding: 0;
        transition: all 0.2s;
    }
    .star-btn.selected {
        color: #ffc107;
        transform: scale(1.1);
    }
    .star-btn:hover {
        transform: scale(1.2);
        color: #ffc107;
    }
    .spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

<script>
    // Character counter for comment field
    const commentField = document.getElementById('id_comment');
    const charCountSpan = document.getElementById('charCount');
    if (commentField) {
        commentField.addEventListener('input', function() {
            charCountSpan.innerText = this.value.length;
        });
    }

    // Disable button on form submit to prevent double submission
    const form = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    if (form) {
        form.addEventListener('submit', function() {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Submitting...';
        });
    }
</script>
{% endblock %}
