{% extends 'voting/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3>Your Profile</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a href="{% url 'voting_history' %}" class="btn btn-secondary">View Voting History</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
