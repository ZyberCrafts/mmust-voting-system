{% extends 'voting/base.html' %}

{% block content %}
<div x-data="passwordReset()" x-init="init()" class="row justify-content-center animate__animated animate__fadeInUp">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <!-- Gradient header -->
            <div class="card-header bg-primary text-white text-center py-4" style="background: linear-gradient(135deg, #0000FF, #0055ff);">
                <i class="fas fa-key fa-2x mb-2"></i>
                <h3 class="mb-0">Reset Password</h3>
                <p class="small mb-0 opacity-75">We'll send you a recovery link</p>
            </div>

            <div class="card-body p-4">
                <form method="post" @submit.prevent="submitForm">
                    {% csrf_token %}
                    
                    <!-- Render form fields with custom styling -->
                    <div class="mb-4">
                        <label for="id_email" class="form-label fw-semibold">
                            <i class="fas fa-envelope text-primary me-2"></i>Email Address
                        </label>
                        <input type="email" name="email" id="id_email" 
                               class="form-control form-control-lg rounded-pill"
                               placeholder="your@email.com"
                               x-model="email"
                               @input="validateEmail"
                               required>
                        <div class="invalid-feedback" x-show="emailError" x-text="emailError"></div>
                        <div class="form-text">Enter the email you used to register.</div>
                    </div>

                    <!-- Loading state and submit button -->
                    <button type="submit" 
                            class="btn btn-primary w-100 py-2 rounded-pill fw-semibold"
                            :disabled="loading || !isEmailValid"
                            style="transition: all 0.3s;">
                        <span x-show="!loading">Send Reset Link <i class="fas fa-paper-plane ms-2"></i></span>
                        <span x-show="loading">
                            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                            Sending...
                        </span>
                    </button>
                </form>

                <!-- Extra links -->
                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="text-decoration-none small">
                        <i class="fas fa-arrow-left me-1"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Inline Alpine.js logic -->
<script>
    function passwordReset() {
        return {
            email: '',
            loading: false,
            emailError: '',
            isEmailValid: false,

            init() {
                // Optional: pre-fill from last used email (localStorage)
                const savedEmail = localStorage.getItem('reset_email');
                if (savedEmail) this.email = savedEmail;
                this.validateEmail();
            },

            validateEmail() {
                const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!this.email) {
                    this.emailError = '';
                    this.isEmailValid = false;
                } else if (!emailPattern.test(this.email)) {
                    this.emailError = 'Please enter a valid email address.';
                    this.isEmailValid = false;
                } else {
                    this.emailError = '';
                    this.isEmailValid = true;
                }
                // Save to localStorage for convenience
                if (this.isEmailValid) localStorage.setItem('reset_email', this.email);
            },

            submitForm() {
                if (!this.isEmailValid) return;
                this.loading = true;
                // Submit the form programmatically
                const form = document.querySelector('form');
                form.submit();
                // Note: The page will reload, so loading state may not persist. 
                // But the user will see the Django message page.
            }
        }
    }
</script>

<!-- Additional CSS for animations and consistency -->
<style>
    .animate__animated {
        animation-duration: 0.6s;
    }
    .form-control:focus {
        border-color: #0000FF;
        box-shadow: 0 0 0 0.2rem rgba(0, 0, 255, 0.25);
    }
    .card {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }
    /* Style for Django's default error messages (if any) */
    .errorlist {
        color: #dc3545;
        list-style: none;
        padding-left: 0;
        font-size: 0.875rem;
        margin-top: 0.25rem;
    }
</style>

<!-- Ensure Font Awesome is loaded (if not already in base) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<!-- Add animate.css for fade animations (optional, but nice) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
{% endblock %}
